name: Build Linux

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential \
            curl \
            patchelf \
            xdg-utils

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Tauri app (Linux)
        working-directory: ./src-tauri
        run: cargo tauri build

      - name: Create artifacts with checksums
        run: |
          ver=$(grep '^version\s*=' src-tauri/Cargo.toml | sed 's/version\s*=\s*"\([^"]*\)"/\1/')
          target="x86_64-unknown-linux-gnu"

          # Rename and checksum .deb
          deb=$(find ./src-tauri/target/release/bundle/deb -name "*.deb")
          debName="ffstudio-$ver-$target.deb"
          mv $deb $debName
          sha256sum $debName > "$debName.sha256"

          # Rename and checksum .AppImage
          appimage=$(find ./src-tauri/target/release/bundle/appimage -name "*.AppImage")
          appimageName="ffstudio-$ver-$target.AppImage"
          mv $appimage $appimageName
          sha256sum $appimageName > "$appimageName.sha256"

          # Create portable tar.gz with checksum
          mkdir -p ffstudio-portable
          cp ./src-tauri/target/release/ffstudio ffstudio-portable/
          tarName="ffstudio-$ver-$target-portable.tar.gz"
          tar -czvf $tarName ffstudio-portable/
          sha256sum $tarName > "$tarName.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            *.deb
            *.AppImage
            *.tar.gz
            *.sha256
