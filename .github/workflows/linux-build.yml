name: Build Linux
on:
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential \
            curl \
            patchelf \
            xdg-utils \
            gvfs-libs
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: List built bundles
        run: |
          find ./src-tauri/target/release/bundle -type f -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" | sort

      - name: Create artifacts with checksums
        run: |
          set -e
          ver=$(awk -F'"' '/^version = /{print $2}' src-tauri/Cargo.toml)
          target="x86_64-unknown-linux-gnu"
          mkdir -p artifacts

          # Rename and checksum .deb
          deb=$(find ./src-tauri/target/release/bundle/deb -name "*.deb" | grep -v sig | head -1)
          if [ -n "$deb" ]; then
            cp "$deb" "artifacts/ffstudio-$ver-$target.deb"
          fi
          # Rename and checksum .AppImage
          appimage=$(find ./src-tauri/target/release/bundle/appimage -name "*.AppImage" | grep -v sig | head -1)
          if [ -n "$appimage" ]; then
            cp "$appimage" "artifacts/ffstudio-$ver-$target.AppImage"
          fi
          # Create portable tar.gz with checksum
          if [ -f ./src-tauri/target/release/ffstudio ]; then
            mkdir -p artifacts/ffstudio-portable
            cp ./src-tauri/target/release/ffstudio artifacts/ffstudio-portable/
            tar -czf "artifacts/ffstudio-$ver-$target-portable.tar.gz" -C artifacts ffstudio-portable/
          fi
          cd artifacts
          for f in *; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "$f.sha256"
            fi
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/*
