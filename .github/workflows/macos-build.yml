name: macOS Build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        run: brew install pkg-config gtk+3

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build Tauri app (macOS ${{ matrix.arch }})
        working-directory: ./src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Create artifacts with checksums
        run: |
          ver=$(grep '^version\s*=' src-tauri/Cargo.toml | sed 's/version\s*=\s*"\([^"]*\)"/\1/')
          target="${{ matrix.target }}"
          arch="${{ matrix.arch }}"

          # Rename and checksum DMG
          dmg=$(find src-tauri/target/$target/release/bundle/dmg -name "*.dmg")
          dmgName="ffstudio-$ver-$target.dmg"
          mv $dmg $dmgName
          shasum -a 256 $dmgName > "$dmgName.sha256"

          # Create portable ZIP with checksum
          APP_DIR=$(find src-tauri/target/$target/release/bundle/macos -name "*.app" -maxdepth 1)
          zipName="ffstudio-$ver-$target-portable.zip"
          ditto -c -k --keepParent "$APP_DIR" $zipName
          shasum -a 256 $zipName > "$zipName.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-artifacts
          path: |
            *.dmg
            *.zip
            *.sha256
